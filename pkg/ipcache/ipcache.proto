syntax = "proto3";

package ipcache;

option go_package = "./ipcache";

message PodInfo {
  string pod_name = 1;
  string pod_namespace = 2;
  map<string, string> pod_labels = 3;
  map<string, string> namespace_labels = 4;
  int64 last_updated = 5;
}
