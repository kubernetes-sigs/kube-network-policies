name: Deployment to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main 
    paths: 
      - 'site/**'
      - 'docs/**'
      - '.github/workflows/deploy-github-pages.yml'
  pull_request:
    paths:
      - 'site/**'
      - 'docs/**'
      - '.github/workflows/deploy-github-pages.yml'

permissions:
  contents: write

env:
  REPO_NAME: ${{ github.event.repository.name }}
  REPO_OWNER: ${{ github.repository_owner }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0         # Fetch all history for .GitInfo and .Lastmod
          submodules: recursive  # Fetch any git submodules if configured

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.136.5' # Matching local Hugo version
          extended: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          check-latest: true

      - name: Install PostCSS dependencies
        run: |
          npm ci || npm install
        working-directory: ./site

      - name: Build Hugo Site
        run: hugo --baseURL https://kube-network-policies.sigs.k8s.io --minify
        working-directory: ./site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site/public
          cname: kube-network-policies.sigs.k8s.io
