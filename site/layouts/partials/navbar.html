        <!-- Theme Toggle -->
        <div class="dropdown">
          <button class="btn btn-link nav-link dropdown-toggle d-flex align-items-center" type="button" id="theme-dropdown"
            data-bs-toggle="dropdown" aria-expanded="false" style="color: #1f2937;">
            <i class="fas fa-sun"></i>
          </button>
          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="theme-dropdown">
            <li><button class="dropdown-item" type="button" onclick="setTheme('light')"><i class="fas fa-sun me-2"></i>
                Light</button></li>
            <li><button class="dropdown-item" type="button" onclick="setTheme('dark')"><i class="fas fa-moon me-2"></i>
                Dark</button></li>
            <li><button class="dropdown-item" type="button" onclick="setTheme('auto')"><i
                  class="fas fa-circle-half-stroke me-2"></i> Auto</button></li>
          </ul>
        </div>
        <script>
          function setTheme(theme) {
            if (theme === 'auto') {
              theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-bs-theme', theme);
            localStorage.setItem('theme', theme);
            
            // Switch syntax highlighting stylesheets
            const lightStyle = document.getElementById('syntax-light');
            const darkStyle = document.getElementById('syntax-dark');
            if (lightStyle && darkStyle) {
              if (theme === 'dark') {
                lightStyle.disabled = true;
                darkStyle.disabled = false;
              } else {
                lightStyle.disabled = false;
                darkStyle.disabled = true;
              }
            }
          }

          // Initialize theme on load
          document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (prefersDark ? 'dark' : 'light');
            setTheme(theme);
          });
        </script>

        <!-- Search -->
        <div class="td-search">
