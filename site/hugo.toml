title = "Kubernetes Network Policies"
baseURL = "https://kube-network-policies.sigs.k8s.io"
languageCode = "en-us"

# we use this to disable indexing for the non-production build
enableRobotsTXT = true

contentDir = "content"

# syntax highlighting options
[markup]
[markup.highlight]
codeFences = true
hl_Lines = ""
lineNoStart = 1
lineNos = false
lineNumbersInTable = true
noClasses = false # Needed for dark mode theme switching
style = "vs"
tabWidth = 4

# allow html in markdown
[markup.goldmark.renderer]
unsafe = true

# enable hugo's menu system for the site, name the primary menu
sectionPagesMenu = "main"
# menu entries
[menu]
[[menu.main]]
identifier = "documentation"
name = "Documentation"
title = "Documentation"
url = "/docs/"
weight = 1

[[menu.main]]
identifier = "quickstart"
name = "Quick Start"
title = "Quick Start"
url = "/docs/quick-start/"
weight = 2

[[menu.main]]
identifier = "userguide"
name = "User Guide"
title = "User Guide"
url = "/docs/user/"
weight = 3

[[menu.main]]
identifier = "concepts"
name = "Concepts"
title = "Concepts"
url = "/docs/concepts/"
weight = 4



[outputs]
home = ["HTML"]

[params]
privacy_policy = "https://policies.google.com/privacy"

# First one is picked as the Twitter card image if not set on page.
# images = ["images/project-illustration.png"]

# Repository configuration (URLs for in-page links to opening issues and suggesting changes)
github_repo = "https://github.com/kubernetes-sigs/kube-network-policies"

# Specify a value here if your content directory is not in your repo's root directory
github_subdir = "site"

# Uncomment this if your GitHub repo does not have "main" as the default branch,
# or specify a new value if you want to reference another branch in your GitHub links
github_branch= "main"

# Google Custom Search Engine ID. Remove or comment out to disable search.
gcs_engine_id = "e6030ba90ccaa44b1"

# Enable Lunr.js offline search
offlineSearch = false

# Enable syntax highlighting and copy buttons on code blocks with Prism
prism_syntax_highlighting = false

[params.copyright]
  authors = "Google LLC | [CC BY 4.0](https://creativecommons.org/licenses/by/4.0) | "
  from_year = 2024

# User interface configuration
[params.ui]
#  Set to true to disable breadcrumb navigation.
breadcrumb_disable = false
# Set to false if you don't want to display a logo (/assets/icons/logo.svg) in the top navbar
navbar_logo = false
# Set to true if you don't want the top navbar to be translucent when over a `block/cover`, like on the homepage.
navbar_translucent_over_cover_disable = false
# Enable to show the side bar menu in its compact state.
sidebar_menu_compact = false
# Set to true to hide the sidebar search box (the top nav search box will still be displayed if search is enabled)
sidebar_search_disable = false
showLightDarkModeMenu = true

# Adds a reading time to the top of each doc.
# If you want this feature, but occasionally need to remove the Reading time from a single page,
# add "hide_readingtime: true" to the page's front matter
[params.ui.readingtime]
enable = false

[params.links]
# End user relevant links. These will show up on left side of footer and in the community page if you have one.
[[params.links.user]]
  name = "SIG Network mailing list"
  url = "https://groups.google.com/forum/#!forum/kubernetes-sig-network"
  icon = "fa fa-envelope"
  desc = "Discussion and help from your fellow users"
[[params.links.developer]]
  name = "GitHub"
  url = "https://github.com/kubernetes-sigs/kube-network-policies"
  icon = "fab fa-github"
  desc = "Development takes place here!"
[[params.links.developer]]
  name = "Slack"
  url = "https://kubernetes.slack.com/messages/sig-network"
  icon = "fab fa-slack"
  desc = "Chat with other project developers"

[services]
[services.googleAnalytics]
# id = "G-YH3W884R6Z"

# privacy settings
[privacy]
[privacy.youtube]
# enable the cookie-less youtube in built-in hugo shortcode
privacyEnhanced = true

[module]
[[module.imports]]
path = 'github.com/google/docsy'
