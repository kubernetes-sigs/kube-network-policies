# This manifest provides an example of how to deploy the kube-ip-tracker
# in a multi-cluster configuration. It uses a Secret to store the kubeconfig
# files for the remote clusters and mounts them into a directory that the
# tracker monitors.
# It also deploys the network policy agent.
---
# 1. Secret containing the kubeconfig files for all clusters in the mesh.
#    Each key in the `data` field should be a filename (e.g., cluster-one.yaml).
#    The value is the base64 encoded content of the corresponding kubeconfig file.
#
#    You can create this secret from existing files using a command like:
#    kubectl create secret generic remote-kubeconfigs \
#      --from-file=cluster-one.yaml=/path/to/your/cluster-one.yaml \
#      --from-file=cluster-two.yaml=/path/to/your/cluster-two.yaml \
#      -n kube-system
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: remote-kubeconfigs
#   namespace: kube-system
# type: Opaque
# data:
#   cluster-one.yaml: base64-encoded-kubeconfig
#   cluster-two.yaml: base64-encoded-kubeconfig

---
# 2. RBAC for the kube-ip-tracker in the management cluster.
#    NOTE: The service accounts/users defined in the kubeconfigs within the
#    'remote-kubeconfigs' secret must have equivalent permissions
#    (get, list, watch on pods, nodes, namespaces) in their respective remote clusters.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-ip-tracker
  namespace: kube-system
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: kube-ip-tracker
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "namespaces"]
    verbs: ["list", "watch", "get"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: kube-ip-tracker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-ip-tracker
subjects:
- kind: ServiceAccount
  name: kube-ip-tracker
  namespace: kube-system
---
# 3. Service to expose the kube-ip-tracker's gRPC port to the on-node agents.
apiVersion: v1
kind: Service
metadata:
  name: kube-ip-tracker
  namespace: kube-system
spec:
  clusterIP: None # Headless service
  selector:
    app: kube-ip-tracker
  ports:
  - name: grpc
    port: 10999
    targetPort: 10999
---
# 4. Deployment of the kube-ip-tracker.
#    This is configured to watch the directory where the kubeconfig
#    secret is mounted.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-ip-tracker
  namespace: kube-system
  labels:
    app: kube-ip-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-ip-tracker
  template:
    metadata:
      labels:
        app: kube-ip-tracker
    spec:
      serviceAccountName: kube-ip-tracker
      containers:
      - name: kube-ip-tracker
        image: registry.k8s.io/networking/kube-ip-tracker:v0.1.0
        args:
        - /bin/kube-ip-tracker
        # Use the new flag to specify the directory to watch.
        - --kubeconfig-dir=/etc/kubeconfigs
        - --v=4
        - --listen-address=http://0.0.0.0:10999
        ports:
        - containerPort: 10999
          name: grpc
        resources:
          requests:
            cpu: "100m"
            memory: "50Mi"
        # Mount the secret as a volume.
        volumeMounts:
        - name: kubeconfigs-volume
          mountPath: /etc/kubeconfigs
          readOnly: true
      # Define the volume based on the secret.
      volumes:
      - name: kubeconfigs-volume
        secret:
          secretName: remote-kubeconfigs
---
# 5. RBAC for the network policy agent.
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: kube-network-policies
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
  - apiGroups:
     - "networking.k8s.io"
    resources:
      - networkpolicies
    verbs:
      - list
      - watch
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: kube-network-policies
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-network-policies
subjects:
- kind: ServiceAccount
  name: kube-network-policies
  namespace: kube-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-network-policies
  namespace: kube-system
---
# 6. DaemonSet of the network policy agent.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-network-policies
  namespace: kube-system
  labels:
    tier: node
    app: kube-network-policies
    k8s-app: kube-network-policies
spec:
  selector:
    matchLabels:
      app: kube-network-policies
  template:
    metadata:
      labels:
        tier: node
        app: kube-network-policies
        k8s-app: kube-network-policies
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
      - operator: Exists
        effect: NoSchedule
      serviceAccountName: kube-network-policies
      containers:
      - name: kube-network-policies
        image: registry.k8s.io/networking/kube-network-policies:v0.8.0
        args:
        - /bin/netpol
        - --hostname-override=$(MY_NODE_NAME)
        - --v=4
        - --nfqueue-id=98
        - --ip-tracker-address=kube-ip-tracker.kube-system.svc.cluster.local:10999
        volumeMounts:
        - name: nri-plugin
          mountPath: /var/run/nri
        - name: netns
          mountPath: /var/run/netns
          mountPropagation: HostToContainer
        resources:
          requests:
            cpu: "100m"
            memory: "50Mi"
        securityContext:
          privileged: true
          capabilities:
            add: ["NET_ADMIN"]
        env:
        - name: MY_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
      volumes:
      - name: nri-plugin
        hostPath:
          path: /var/run/nri
      - name: netns
        hostPath:
          path: /var/run/netns